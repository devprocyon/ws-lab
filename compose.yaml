services:
  api:
    build:
      dockerfile: apps/api/Dockerfile
      target: dev
    environment:
      API_PORT: 5000
      WEB_URL: ${WEB_URL}
      CORS_ORIGIN: ${CORS_ORIGIN}
      CASDOOR_INTERNAL_URL: ${CASDOOR_INTERNAL_URL}
      CASDOOR_EXTERNAL_URL: ${CASDOOR_EXTERNAL_URL}
      CASDOOR_CLIENT_ID: ${CASDOOR_CLIENT_ID}
      CASDOOR_CLIENT_SECRET: ${CASDOOR_CLIENT_SECRET}
      CASDOOR_REDIRECT_URI: ${CASDOOR_REDIRECT_URI}
      CASDOOR_APP_NAME: ${CASDOOR_APP_NAME}
      CASDOOR_PUBLIC_KEY: ${CASDOOR_PUBLIC_KEY}
      BINANCE_WS_URL: ${BINANCE_WS_URL}
    ports:
      - "5000:5000"
    volumes:
      - ./apps/api/src:/app/apps/api/src

  casdoor-db:
    image: postgres:17
    restart: always
    user: postgres
    environment:
      POSTGRES_USER: ${CASDOOR_DB_USERNAME}
      POSTGRES_PASSWORD: ${CASDOOR_DB_PASSWORD}
      POSTGRES_DB: ${CASDOOR_DB_NAME}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - casdoor-db-data:/var/lib/postgresql/data

  casdoor:
    image: casbin/casdoor:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./infrastructure/casdoor/conf:/conf
    depends_on:
      casdoor-db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/conf/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infrastructure/certs:/etc/nginx/certs:ro

volumes:
  casdoor-db-data:
